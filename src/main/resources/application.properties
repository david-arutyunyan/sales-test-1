spring.application.name=sales-test-1

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/salesdb
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Session TTL (seconds) — 24 hours
app.session.ttl=86400

# Yandex Cloud Logging
# API key: Yandex Cloud Console → IAM → Service Accounts → your account → API Keys → Create
# Log Group ID: Cloud Logging → Log Groups → Create group → copy ID
logging.yandex.api-key=YOUR_YANDEX_API_KEY_HERE
logging.yandex.log-group-id=YOUR_LOG_GROUP_ID_HERE

# Server port
server.port=8080
